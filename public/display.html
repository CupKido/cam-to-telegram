<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Display</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      body {
        background: #000;
      }

      img {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        display: block;
        background: #000;
      }

      .overlay {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 20px;
        pointer-events: none;
      }

      .status-dot {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        flex-shrink: 0;
        background: #ef4444;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.45);
      }

      .status-dot.connected {
        background: #22c55e;
      }

      .photo-name {
        margin: 0;
        margin-left: auto;
        max-width: min(50vw, 420px);
        font-size: 12px;
        line-height: 1.4;
        color: #f9fafb;
        text-align: right;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <img id="photo" alt="Latest uploaded photo" />
    <div class="overlay">
      <div
        id="connection-status"
        class="status-dot"
        aria-label="Connecting"
        aria-live="polite"
      ></div>
      <p id="photo-name" class="photo-name" aria-live="polite"></p>
    </div>

    <script>
      const photoElement = document.getElementById("photo");
      const photoNameElement = document.getElementById("photo-name");
      const connectionStatusElement = document.getElementById("connection-status");
      const DISPLAY_DURATION_MS = 5000;
      let imageVersion = 0;
      const displayQueue = [];
      let displayTimeoutId = null;
      const socketProtocol = window.location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(
        `${socketProtocol}://${window.location.host}/display-updates`,
      );

      const setConnectionStatus = (status, isConnected) => {
        connectionStatusElement.classList.toggle("connected", isConnected);
        connectionStatusElement.setAttribute("aria-label", status);
        connectionStatusElement.title = status;
      };

      socket.addEventListener("open", () => {
        setConnectionStatus("Connected", true);
      });

      const showNextQueuedImage = () => {
        if (displayQueue.length === 0) {
          displayTimeoutId = null;
          return;
        }

        const { filename, imageUrl } = displayQueue.shift();
        const parsedImageUrl = new URL(imageUrl, window.location.origin);

        imageVersion += 1;
        parsedImageUrl.searchParams.set("v", imageVersion);
        photoElement.src = parsedImageUrl.toString();
        photoNameElement.textContent = filename;
        displayTimeoutId = window.setTimeout(
          showNextQueuedImage,
          DISPLAY_DURATION_MS,
        );
      };

      socket.addEventListener("message", (event) => {
        try {
          const { filename, imageUrl } = JSON.parse(event.data);
          const parsedImageUrl = new URL(imageUrl, window.location.origin);
          const isQueuedDisplayImagePath = /^\/display\/image\/\d+$/.test(
            parsedImageUrl.pathname,
          );

          if (
            parsedImageUrl.origin !== window.location.origin ||
            (!isQueuedDisplayImagePath &&
              parsedImageUrl.pathname !== "/display/latest-image")
          ) {
            throw new Error("Invalid image URL");
          }
          displayQueue.push({ filename, imageUrl: parsedImageUrl.toString() });

          if (displayTimeoutId === null) {
            showNextQueuedImage();
          }
        } catch (error) {
          setConnectionStatus("Invalid update received", false);
        }
      });

      socket.addEventListener("close", () => {
        setConnectionStatus("Disconnected", false);
      });

      socket.addEventListener("error", () => {
        setConnectionStatus("Connection error", false);
      });
    </script>
  </body>
</html>
