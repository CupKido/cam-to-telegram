<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Display</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #111827;
        color: #f9fafb;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      main {
        width: min(100%, 960px);
        padding: 24px;
        text-align: center;
      }

      img {
        display: none;
        max-width: 100%;
        max-height: 80vh;
        border-radius: 12px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      p {
        margin: 12px 0 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Latest photo</h1>
      <img id="photo" alt="Latest uploaded photo" />
      <p id="photo-name">Waiting for a photo...</p>
      <p id="connection-status">Connecting…</p>
    </main>

    <script>
      const photoElement = document.getElementById("photo");
      const photoNameElement = document.getElementById("photo-name");
      const connectionStatusElement =
        document.getElementById("connection-status");
      const socketProtocol = window.location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(
        `${socketProtocol}://${window.location.host}/display-updates`,
      );

      socket.addEventListener("open", () => {
        connectionStatusElement.textContent = "Connected";
      });

      socket.addEventListener("message", (event) => {
        const { filename, imageSrc } = JSON.parse(event.data);
        photoElement.src = imageSrc;
        photoElement.style.display = "block";
        photoNameElement.textContent = filename;
      });

      socket.addEventListener("close", () => {
        connectionStatusElement.textContent = "Disconnected";
      });

      socket.addEventListener("error", () => {
        connectionStatusElement.textContent = "Connection error";
      });
    </script>
  </body>
</html>
